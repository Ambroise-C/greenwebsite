<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeafTask | Pure Green</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav class="top-nav">
            <span class="logo">LEAFTASK // v1.0</span>
            <div class="nav-links">
                <a href="#">LOGOUT</a>
                <a href="#">PROFILE</a>
            </div>
        </nav>

        <header>
            <h1>Task Dashboard</h1>
        </header>

        <section class="box entry-box">
            <label>CREATE NEW TASK</label>
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Enter task title...">
                <button id="addBtn">ADD TASK</button>
            </div>
        </section>

        <section class="box table-box">
            <table id="taskTable">
                <thead>
                    <tr>
                        <th>STATUS</th>
                        <th>TITLE</th>
                        <th class="text-right">ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="taskBody">
                    </tbody>
            </table>
        </section>

        <footer class="box stats-box">
            <span id="stats">Total Tasks: 0 | Completed: 0 | Pending: 0</span>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
