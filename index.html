<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeafTask | Pure Green</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav class="top-nav">
            <span class="logo">LEAFTASK // v1.0</span>
            <div id="auth-zone">
                <div id="login-form">
                    <input type="text" id="userIn" placeholder="Pseudo">
                    <input type="password" id="passIn" placeholder="Mot de passe">
                    <button class="action-btn" onclick="handleAuth()">LOGIN / SIGNUP</button>
                </div>
                <div id="user-logged" style="display:none;">
                    <span id="user-display"></span>
                    <button class="action-btn" onclick="logout()">LOGOUT</button>
                </div>
            </div>
        </nav>

        <header>
            <h1>Task Dashboard</h1>
        </header>

        <section class="box entry-box">
            <label>CREATE NEW TASK</label>
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Enter task title...">
                <button id="addBtn">ADD TASK</button>
            </div>
        </section>

        <section class="box table-box">
            <table id="taskTable">
                <thead>
                    <tr>
                        <th>STATUS</th>
                        <th>TITLE</th>
                        <th class="text-right">ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="taskBody"></tbody>
            </table>
        </section>

        <footer class="box stats-box">
            <span id="stats">Total Tasks: 0 | Completed: 0 | Pending: 0</span>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
